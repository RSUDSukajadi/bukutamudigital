<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buku Tamu Digital - RSUD Sukajadi</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
    <h2><i class="fa-solid fa-hospital"></i> RSUD Sukajadi</h2>
    <button class="login-btn" id="loginBtn" onclick="showLogin()">
    <i class="fa-solid fa-right-to-bracket"></i> Login Admin
</button>
</header>

<!-- FORM BUKU TAMU -->
<div class="container" id="formPage">
    <h3>Buku Tamu Digital</h3>

<div id="waktuBox">
    <div id="tanggalSekarang"></div>
    <div id="jamSekarang" style="font-size:22px;font-weight:700;"></div>
</div>

    <form id="guestForm">
        <div class="form-group">
            <label>Nama</label>
            <input type="text" id="nama" required>
        </div>
        <div class="form-group">
            <label>Instansi</label>
            <input type="text" id="instansi">
        </div>
        <div class="form-group">
            <label>No HP</label>
            <input type="tel" id="hp" required>
        </div>
        <div class="form-group">
            <label>Keperluan</label>
            <textarea id="keperluan" required></textarea>
        </div>
        <div class="form-group">
            <label>Unit Tujuan</label>
            <select id="unit" required>
                <option value="">-- Pilih Unit --</option>
                <option>IGD</option>
                <option>Rawat Jalan</option>
                <option>Rawat Inap</option>
                <option>Administrasi</option>
                <option>Direksi</option>
		<option>Lainnya</option>
            </select>
        </div>
        <button type="submit" class="submit-btn">Kirim</button>
    </form>
</div>

<!-- LOGIN ADMIN -->
<!-- LOGIN ADMIN -->
<div class="container hidden" id="loginPage">
    <h3>Login Admin</h3>

    <div class="form-group">
        <label>Username</label>
        <input type="text" id="adminUser" placeholder="Masukkan Username">
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" id="adminPass" placeholder="Masukkan Password">
    </div>

    <button class="submit-btn" onclick="login()">Login</button>
    <button class="logout-btn" style="margin-top:10px;background:gray;"
        onclick="backToForm()">Kembali</button>
</div>

<!-- DASHBOARD ADMIN -->
<div class="container hidden" id="adminPage">
    <h3>Dashboard Admin</h3>

    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px;">
        <button class="logout-btn" onclick="logout()">Logout</button>
        <button class="submit-btn" style="background:green;width:auto;padding:8px 15px;"
            onclick="exportExcel()">Export to Excel</button>
    </div>

    <!-- CARD STATISTIK -->
    <div id="statistikCard" style="display:flex;gap:15px;flex-wrap:wrap;margin-bottom:20px;">
        <div style="flex:1;background:#0f4c81;color:white;padding:15px;border-radius:10px;text-align:center;">
            <h4>Total Tamu</h4>
            <h2 id="totalTamu">0</h2>
        </div>
        <div style="flex:1;background:#17a2b8;color:white;padding:15px;border-radius:10px;text-align:center;">
            <h4>Tamu Hari Ini</h4>
            <h2 id="tamuHariIni">0</h2>
        </div>
    </div>

    <!-- GRAFIK -->
    <canvas id="guestChart"></canvas>

    <!-- TABEL -->
    <div style="overflow-x:auto;margin-top:20px;">
        <table>
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Instansi</th>
                    <th>No HP</th>
                    <th>Keperluan</th>
                    <th>Unit</th>
                    <th>Tanggal</th>
                </tr>
            </thead>
            <tbody id="dataTable"></tbody>
        </table>
    </div>
</div>

<script>
const ADMIN_USERNAME = "admin";
const ADMIN_PASSWORD = "rsud123";

function showLogin(){
    document.getElementById("formPage").classList.add("hidden");
    document.getElementById("adminPage").classList.add("hidden");   // tambahkan ini
    document.getElementById("loginPage").classList.remove("hidden");
}

function exportExcel(){
    const guests = JSON.parse(localStorage.getItem("guests")) || [];

    if(guests.length === 0){
        alert("Tidak ada data untuk diexport.");
        return;
    }

    let csvContent = "data:text/csv;charset=utf-8,";
    csvContent += "Nama,Instansi,No HP,Keperluan,Unit,Tanggal\n";

    guests.forEach(g => {
        csvContent += `${g.nama},${g.instansi},${g.hp},${g.keperluan},${g.unit},${g.tanggal}\n`;
    });

    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", "Data_Tamu_RSUD_Sukajadi.csv");
    document.body.appendChild(link);
    link.click();
}

function login(){
    const user = document.getElementById("adminUser").value;
    const pass = document.getElementById("adminPass").value;

    if(user === ADMIN_USERNAME && pass === ADMIN_PASSWORD){
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("adminPage").classList.remove("hidden");
        document.getElementById("loginBtn").style.display = "none";
        loadData();
    }else{
        alert("Username atau Password salah!");
    }
}

function logout(){
    document.getElementById("adminPage").classList.add("hidden");
    document.getElementById("loginPage").classList.remove("hidden");
    document.getElementById("loginBtn").style.display = "flex";
}
function backToForm(){
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("formPage").classList.remove("hidden");
}

/* LOGIN DENGAN ENTER */
document.addEventListener("keypress", function(e){
    if(e.key === "Enter" && !document.getElementById("loginPage").classList.contains("hidden")){
        login();
    }
});

document.getElementById("guestForm").addEventListener("submit", function(e){
    e.preventDefault();

    const data = {
        nama: nama.value,
        instansi: instansi.value,
        hp: hp.value,
        keperluan: keperluan.value,
        unit: unit.value,
        tanggal: new Date().toLocaleString()
    };

    let guests = JSON.parse(localStorage.getItem("guests")) || [];
    guests.push(data);
    localStorage.setItem("guests", JSON.stringify(guests));

    alert("Data berhasil dikirim!");
    this.reset();
});

let chart;

function loadData(){
    const guests = JSON.parse(localStorage.getItem("guests")) || [];
    const table = document.getElementById("dataTable");
    table.innerHTML = "";

    let unitCount = {};
    let today = new Date().toLocaleDateString();
    let tamuHariIni = 0;

    guests.forEach(g => {

        table.innerHTML += `
        <tr>
            <td>${g.nama}</td>
            <td>${g.instansi}</td>
            <td>${g.hp}</td>
            <td>${g.keperluan}</td>
            <td>${g.unit}</td>
            <td>${g.tanggal}</td>
        </tr>`;

        // Hitung per unit
        unitCount[g.unit] = (unitCount[g.unit] || 0) + 1;

        // Hitung tamu hari ini
        if(g.tanggal.includes(today)){
            tamuHariIni++;
        }
    });

    // Update Statistik Card
    document.getElementById("totalTamu").innerText = guests.length;
    document.getElementById("tamuHariIni").innerText = tamuHariIni;

    // Hapus grafik lama jika ada
    if(chart){
        chart.destroy();
    }

    const ctx = document.getElementById("guestChart").getContext("2d");

    chart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: Object.keys(unitCount),
            datasets: [{
                label: "Jumlah Tamu per Unit",
                data: Object.values(unitCount),
                backgroundColor: "#0f4c81"
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: true }
            }
        }
    });
}

function updateWaktu(){
    const sekarang = new Date();

    const opsiTanggal = { 
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
    };

    const tanggal = sekarang.toLocaleDateString('id-ID', opsiTanggal);
    const jam = sekarang.toLocaleTimeString('id-ID');

    document.getElementById("tanggalSekarang").innerText = tanggal;
    document.getElementById("jamSekarang").innerText = jam;
}

// Jalankan pertama kali
updateWaktu();

// Update setiap 1 detik
setInterval(updateWaktu, 1000);

</script>

</body>
</html>
